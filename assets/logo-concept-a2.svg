<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="40" fill="#0F0F0F"/>

  <!-- 4x4 dot grid -->
  <!-- Dim dots -->
  <circle cx="52"  cy="52"  r="5" fill="#222"/>
  <circle cx="84"  cy="52"  r="5" fill="#222"/>
  <circle cx="116" cy="52"  r="5" fill="#222"/>
  <circle cx="148" cy="52"  r="5" fill="#222"/>

  <circle cx="52"  cy="84"  r="5" fill="#222"/>
  <circle cx="84"  cy="84"  r="5" fill="#222"/>
  <circle cx="116" cy="84"  r="5" fill="#222"/>
  <circle cx="148" cy="84"  r="5" fill="#222"/>

  <circle cx="52"  cy="116" r="5" fill="#222"/>
  <circle cx="84"  cy="116" r="5" fill="#222"/>
  <circle cx="116" cy="116" r="5" fill="#222"/>
  <circle cx="148" cy="116" r="5" fill="#222"/>

  <circle cx="52"  cy="148" r="5" fill="#222"/>
  <circle cx="84"  cy="148" r="5" fill="#222"/>
  <circle cx="116" cy="148" r="5" fill="#222"/>
  <circle cx="148" cy="148" r="5" fill="#222"/>

  <!-- L-shaped path: down the left col then across the bottom row -->
  <line x1="52" y1="52"  x2="52"  y2="148" stroke="#818CF8" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="148" x2="148" y2="148" stroke="#818CF8" stroke-width="3" stroke-linecap="round"/>

  <!-- Highlighted path dots -->
  <circle cx="52"  cy="52"  r="7" fill="#818CF8"/>
  <circle cx="52"  cy="84"  r="7" fill="#818CF8"/>
  <circle cx="52"  cy="116" r="7" fill="#818CF8"/>
  <circle cx="52"  cy="148" r="9" fill="#818CF8"/>
  <circle cx="84"  cy="148" r="7" fill="#818CF8"/>
  <circle cx="116" cy="148" r="7" fill="#818CF8"/>
  <circle cx="148" cy="148" r="9" fill="#FFFFFF"/>
</svg>
