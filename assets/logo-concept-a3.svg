<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="pathGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="36" fill="#111118"/>

  <!-- 4x4 dot grid, square dots for a harder geometric feel -->
  <!-- Dim squares -->
  <rect x="47" y="47" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="79" y="47" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="111" y="47" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="143" y="47" width="10" height="10" rx="2" fill="#1E1E2E"/>

  <rect x="47" y="79" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="79" y="79" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="111" y="79" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="143" y="79" width="10" height="10" rx="2" fill="#1E1E2E"/>

  <rect x="47" y="111" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="79" y="111" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="111" y="111" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="143" y="111" width="10" height="10" rx="2" fill="#1E1E2E"/>

  <rect x="47" y="143" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="79" y="143" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="111" y="143" width="10" height="10" rx="2" fill="#1E1E2E"/>
  <rect x="143" y="143" width="10" height="10" rx="2" fill="#1E1E2E"/>

  <!-- Diagonal path line (bottom-left to top-right) -->
  <line x1="52" y1="148" x2="84"  y2="116" stroke="url(#pathGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="116" x2="116" y2="84"  stroke="url(#pathGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="116" y1="84" x2="148" y2="52"  stroke="url(#pathGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Highlighted path squares (larger, gradient fill) -->
  <rect x="44" y="140" width="16" height="16" rx="3" fill="url(#pathGrad)"/>
  <rect x="76" y="108" width="16" height="16" rx="3" fill="url(#pathGrad)"/>
  <rect x="108" y="76" width="16" height="16" rx="3" fill="url(#pathGrad)"/>
  <rect x="140" y="44" width="16" height="16" rx="3" fill="url(#pathGrad)"/>
</svg>
